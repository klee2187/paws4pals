<!DOCTYPE html> 
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <title>Paws4Pals | Login</title> 
    
    <link rel="stylesheet" href="../css/style.css" /> 
    <script type="module" src="../login.js" defer></script> 
  </head> 

    <body> 

        <header class="divider" id="main-header"></header>

        <main>
            <section class="login">
                <h1>Login</h1>
                <form id="login-form">
                    <label>Email:</label>
                    <input type="text" id="email" placeholder="example@mail.com" required>
                    <label>Password:</label>
                    <input type="password" id="password" placeholder="min 8 characters" required>
                    <button type="submit" id="login-button">Sign In</button>
                </form>
            </section>

        </main>
        <footer id="main-footer"></footer> 
    </body>
</html>
